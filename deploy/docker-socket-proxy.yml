#
# Filtered Docker socket proxy. The direct /var/run/docker.sock is root-equivalent;
# instead this proxy exposes ONLY the endpoints the control plane needs,
# at tcp://127.0.0.1:2375. Then set in /etc/linuxmuster-squid/config.yml:
#   docker_host: "tcp://127.0.0.1:2375"
# and restart the service. (ADR-012.)
services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2   # fixed version instead of :latest (Renovate pins the @sha256 digest)
    environment:
      CONTAINERS: "1"   # create/inspect/start/stop/remove/logs
      IMAGES: "1"       # pull
      VOLUMES: "1"      # cache volumes
      POST: "1"         # allow mutating calls
      INFO: "1"
      # Everything else explicitly off (minimize attack surface):
      EXEC: "0"          # NOTE: disables `lmnsquid access-logs` (history via docker exec);
                         # the live `logs` path (container.logs) keeps working. See ADR-012.
      NETWORKS: "0"
      AUTH: "0"
      SECRETS: "0"
      SWARM: "0"
      SYSTEM: "0"
      CONFIGS: "0"
      NODES: "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:2375:2375"
    read_only: true
    tmpfs: ["/run", "/tmp"]
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped
