# E2E client krb5.conf. rdns/dns_canonicalize_hostname=false → the SPN is built
# from the literally typed FQDN (no PTR needed in the Compose network). KDC hardcoded.
[libdefaults]
    default_realm = EXAMPLE.INTERNAL
    dns_lookup_realm = false
    dns_lookup_kdc = false
    dns_canonicalize_hostname = false
    rdns = false
    forwardable = true

[realms]
    EXAMPLE.INTERNAL = {
        kdc = 172.28.0.2
    }

[domain_realm]
    .example.internal = EXAMPLE.INTERNAL
    example.internal = EXAMPLE.INTERNAL
