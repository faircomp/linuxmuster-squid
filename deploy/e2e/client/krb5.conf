# E2E-Client-krb5.conf. rdns/dns_canonicalize_hostname=false → SPN wird aus dem
# literal getippten FQDN gebildet (kein PTR im Compose-Netz nötig). KDC hardcoded.
[libdefaults]
    default_realm = EXAMPLE.INTERNAL
    dns_lookup_realm = false
    dns_lookup_kdc = false
    dns_canonicalize_hostname = false
    rdns = false
    forwardable = true

[realms]
    EXAMPLE.INTERNAL = {
        kdc = 172.28.0.2
    }

[domain_realm]
    .example.internal = EXAMPLE.INTERNAL
    example.internal = EXAMPLE.INTERNAL
