# Kerberos E2E stack for linuxmuster-squid (heavy tier / crabbox).
# Proves: teacher->200, student->403, blocked domain->403, no ticket->407.
# Orchestrated by scripts/tests/e2e_kerberos.sh (brings services up in order,
# creates fixtures and runs the assertions). Realm/domain: EXAMPLE.INTERNAL.
name: lmnsquid-e2e

networks:
  e2e:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  shared: {}          # DC exports the Keytab here, Squid reads it (ro)

services:
  # KDC + AD-LDAP + internal DNS. Creates the domain on first start.
  samba-dc:
    image: nowsci/samba-domain
    hostname: dc
    privileged: true
    environment:
      DOMAIN: "EXAMPLE.INTERNAL"
      DOMAINPASS: "Passw0rd!"
      NOCOMPLEXITY: "true"
      HOSTIP: "172.28.0.2"
      INSECURELDAP: "true"
    networks:
      e2e:
        ipv4_address: 172.28.0.2
    volumes:
      - shared:/shared

  # The image under test.
  squid:
    build: ../../image
    image: linuxmuster-squid:dev
    hostname: squid.example.internal
    depends_on: [samba-dc]
    environment:
      INSTANCE: "e2e-teachers"
      VISIBLE_HOSTNAME: "squid.example.internal"
      REALM: "EXAMPLE.INTERNAL"
      AD_GROUP: "teachers"
      SCHOOL_SUBNETS: "0.0.0.0/0"      # Subnet scope is tested in P3
      KEYTAB: "/shared/squid.keytab"
      CACHE_SIZE_MB: "200"
    dns: ["172.28.0.2"]               # AD-DNS: resolves SRV/_ldap._tcp + origin A-record
    networks:
      e2e:
        ipv4_address: 172.28.0.10
    volumes:
      - shared:/shared:ro
      - ./blocked.domains:/etc/squid/lists/blocked.domains:ro
    read_only: true
    tmpfs: ["/run", "/tmp", "/var/log/squid", "/var/spool/squid"]
    cap_drop: ["ALL"]
    cap_add: ["SETUID", "SETGID", "DAC_OVERRIDE", "CHOWN"]
    security_opt: ["no-new-privileges:true"]

  # 2nd school (Multischool): the SAME image, different group/FQDN — proves isolation
  # + prefix rule (default-school unprefixed, other schools "<schule>-...").
  squid2:
    image: linuxmuster-squid:dev
    hostname: squid2.example.internal
    depends_on: [samba-dc, squid]
    environment:
      INSTANCE: "e2e-schule2-teachers"
      VISIBLE_HOSTNAME: "squid2.example.internal"
      REALM: "EXAMPLE.INTERNAL"
      AD_GROUP: "schule2-teachers"
      SCHOOL_SUBNETS: "0.0.0.0/0"
      KEYTAB: "/shared/squid.keytab"
      CACHE_SIZE_MB: "200"
    dns: ["172.28.0.2"]
    networks:
      e2e:
        ipv4_address: 172.28.0.11
    volumes:
      - shared:/shared:ro
      - ./blocked.domains:/etc/squid/lists/blocked.domains:ro
    read_only: true
    tmpfs: ["/run", "/tmp", "/var/log/squid", "/var/spool/squid"]
    cap_drop: ["ALL"]
    cap_add: ["SETUID", "SETGID", "DAC_OVERRIDE", "CHOWN"]
    security_opt: ["no-new-privileges:true"]

  # Internet gate: teachers AND (internet OR schule2-internet) -> proves the linuxmuster
  # "Internetsperre" multi-group OR gate (a user passes if in ANY listed internet group,
  # so it covers visitors) and fail-closed when in none.
  squid-inet:
    image: linuxmuster-squid:dev
    hostname: squid3.example.internal
    depends_on: [samba-dc, squid]
    environment:
      INSTANCE: "e2e-inet"
      VISIBLE_HOSTNAME: "squid3.example.internal"
      REALM: "EXAMPLE.INTERNAL"
      AD_GROUP: "teachers"
      INTERNET_GROUP: "internet:schule2-internet"
      SCHOOL_SUBNETS: "0.0.0.0/0"
      KEYTAB: "/shared/squid.keytab"
      CACHE_SIZE_MB: "200"
    dns: ["172.28.0.2"]
    networks:
      e2e:
        ipv4_address: 172.28.0.12
    volumes:
      - shared:/shared:ro
      - ./blocked.domains:/etc/squid/lists/blocked.domains:ro
    read_only: true
    tmpfs: ["/run", "/tmp", "/var/log/squid", "/var/spool/squid"]
    cap_drop: ["ALL"]
    cap_add: ["SETUID", "SETGID", "DAC_OVERRIDE", "CHOWN"]
    security_opt: ["no-new-privileges:true"]

  # Allowed target (returns 200).
  origin:
    image: nginx:alpine
    hostname: origin.example.internal
    networks:
      e2e:
        ipv4_address: 172.28.0.20

  # Allowed HTTPS target (self-signed) — for the splice test.
  origin-https:
    build: ./origin-https
    hostname: secure.example.internal
    networks:
      e2e:
        ipv4_address: 172.28.0.21

  # Kerberos client that runs the four assertions (ENTRYPOINT = /assert.sh).
  test-client:
    build: ./client
    depends_on: [squid]
    dns: ["172.28.0.2"]
    networks:
      e2e:
        ipv4_address: 172.28.0.30
