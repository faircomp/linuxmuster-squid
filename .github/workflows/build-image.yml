# Build the data-plane Squid image and push it to GHCR by tag + immutable digest.
# Renovate then pins that digest in the deployment; a human merges the bump.
name: build-image

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths: ["image/**", ".github/workflows/build-image.yml"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/linuxmuster-squid
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: image
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Report digest
        run: |
          echo "Published ghcr.io/${{ github.repository_owner }}/linuxmuster-squid"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          echo "Pin this digest via Renovate (docker:pinDigests)."
